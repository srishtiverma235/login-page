<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            margin:0;
            padding:20px;
            background-color: rgb(158, 219, 196);
            color: blue;

        }
        .nav-container{
            background-color: rgb(226, 152, 211);
            padding: 50px;
            border-radius: 5px;
            
        }
        h2{
            margin-bottom: 20px;


        
        }
        .nav1{
            background-color: rgb(198, 234, 163);
            padding: 10px;
            border-radius: 5px;
            border-color: blanchedalmond;
            border: 1px solid;
        }
        .nav1 ul{
            list-style-type: none;
            margin:0;
            padding:10px;
           display:flex;
           gap:55px;
        }
        .nav-container1{
            background-color: rgb(226, 152, 211);
            padding: 50px;
            border-radius: 5px;
            margin-top: 20px;
        }
        h3{
            margin-bottom: 20px;
        }
        .nav2{
            background-color: rgb(242, 190, 48);
            padding: 10px;
            border-radius: 5px;
            border-color: blanchedalmond;
            border: 1px solid;
        }
        .nav2 ul{
            list-style-type: none;
            margin:0;
            padding:10px;
           display:flex;
           gap:55px;
        }
        .nav2 a{
            text-decoration: none;
            color: rgb(112, 37, 37);
            position:relative;
            padding:5pc 15px;

        }
        .nav2 a::after{
            content: "Srishti";
            position: absolute;
            width: 100%;
            height: 1px;
            background-color: rgb(95, 6, 49);
            left: 0;
            bottom: 0;
            transform: scaleX(0);
            transition: transform 0.1ms
            ease-in-out;
        }
        .nav2 a:hover::after{
            transform: scaleY(1);
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <h2>Variation 1</h2>
        <nav class ="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="nav-container1">
        <h3>Variation 1</h3>
        <nav class ="nav2">

            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </div>
</body>
</html>
