<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            font=family:font-family: Arial,sans-serif;
            background-color:grey;
            display:flex;
            margin:0;
            padding:0;
            height: 100vh;/*to make website responsive allows different sizes mobile or laptop imp*/
            justify-content:center;
            align-items:center;


        }
        .card{
            background-color: white;
            padding: 40px;/* padding around the content inside the card */
            border-radius: 40px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        h2{
            color: rgb(62, 62, 174);
            text-align: center;
            margin-bottom: 20px;

        }
        form{
            display:flex ;
            flex-direction: column;
            
        }
        input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 20px;
            background-color: bisque;
            border-color: black;
            border-width: 6px;
            
        }
        button{
            padding: 10px;;
            border-radius: 5px;
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>
            Srishti's Login Page!
        </h2>
        <form>
            <input type="email" name="" id="" placeholder="Email">
            <input type="password" name="" id="" placeholder="Password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
